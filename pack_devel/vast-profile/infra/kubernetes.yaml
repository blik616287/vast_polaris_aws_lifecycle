# spectrocloud.com/enabled-presets: Kube Controller Manager:loopback-ctrlmgr,Kube Scheduler:loopback-scheduler,Azure Disk Encryption Set:disable-azure-disk-encryption
pack:
  content:
    images:
      - image: registry.k8s.io/coredns/coredns:v1.12.1
      - image: registry.k8s.io/etcd:3.6.5-0
      - image: registry.k8s.io/kube-apiserver:v1.34.5
      - image: registry.k8s.io/kube-controller-manager:v1.34.5
      - image: registry.k8s.io/kube-proxy:v1.34.5
      - image: registry.k8s.io/kube-scheduler:v1.34.5
      - image: registry.k8s.io/pause:3.9
      - image: registry.k8s.io/pause:3.8
      - image: registry.k8s.io/pause:3.10
  #CIDR Range for Pods in cluster
  # Note : This must not overlap with any of the host or service network
  #podCIDR: '{{ .spectro.var.K8sPodCIDR }}'
  podCIDR: 100.64.0.0/18
  #CIDR notation IP range from which to assign service cluster IPs
  # Note : This must not overlap with any IP ranges assigned to nodes for pods.
  #serviceClusterIpRange: '{{ .spectro.var.K8sServiceCIDR }}'
  serviceClusterIpRange: 100.64.64.0/18
  palette:
    config:
      dashboard:
        identityProvider: palette
  # serviceDomain: "cluster.local"

kubeadmconfig:
  apiServer:
    extraArgs:
      # Note : secure-port flag is used during kubeadm init. Do not change this flag on a running cluster
      secure-port: "6443"
      anonymous-auth: "true"
      profiling: "false"
      disable-admission-plugins: "AlwaysAdmit"
      default-not-ready-toleration-seconds: "300"
      default-unreachable-toleration-seconds: "300"
      enable-admission-plugins: "NamespaceLifecycle,ServiceAccount,NodeRestriction,PodSecurity"
      admission-control-config-file: "/etc/kubernetes/pod-security-standard.yaml"
      audit-log-path: /var/log/apiserver/audit.log
      audit-policy-file: /etc/kubernetes/audit-policy.yaml
      audit-log-maxage: "30"
      audit-log-maxbackup: "10"
      audit-log-maxsize: "100"
      authorization-mode: RBAC,Node
      kubelet-certificate-authority: "/etc/kubernetes/pki/ca.crt"
      tls-cipher-suites: "TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256,TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256,TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305,TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384,TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305,TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384"
    extraVolumes:
      - name: audit-log
        hostPath: /var/log/apiserver
        mountPath: /var/log/apiserver
        pathType: DirectoryOrCreate
      - name: audit-policy
        hostPath: /etc/kubernetes/audit-policy.yaml
        mountPath: /etc/kubernetes/audit-policy.yaml
        readOnly: true
        pathType: File
      - name: pod-security-standard
        hostPath: /etc/kubernetes/pod-security-standard.yaml
        mountPath: /etc/kubernetes/pod-security-standard.yaml
        readOnly: true
        pathType: File
  controllerManager:
    extraArgs:
      profiling: "false"
      terminated-pod-gc-threshold: "25"
      use-service-account-credentials: "true"
      feature-gates: "RotateKubeletServerCertificate=true"
  scheduler:
    extraArgs:
      profiling: "false"
  kubeletExtraArgs:
    config-dir: "/etc/kubernetes/kubelet.conf.d"
    read-only-port: "0"
    event-qps: "0"
    feature-gates: "RotateKubeletServerCertificate=true"
    protect-kernel-defaults: "true"
    rotate-server-certificates: "true"
    tls-cipher-suites: "TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256,TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256,TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305,TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384,TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305,TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384"
  files:
    - path: hardening/audit-policy.yaml
      targetPath: /etc/kubernetes/audit-policy.yaml
      targetOwner: "root:root"
      targetPermissions: "0600"
    - path: hardening/90-kubelet.conf
      targetPath: /etc/sysctl.d/90-kubelet.conf
      targetOwner: "root:root"
      targetPermissions: "0600"
    - targetPath: /etc/kubernetes/pod-security-standard.yaml
      targetOwner: "root:root"
      targetPermissions: "0600"
      content: |
        apiVersion: apiserver.config.k8s.io/v1
        kind: AdmissionConfiguration
        plugins:
        - name: PodSecurity
          configuration:
            apiVersion: pod-security.admission.config.k8s.io/v1
            kind: PodSecurityConfiguration
            defaults:
              enforce: "baseline"
              enforce-version: "v1.34"
              audit: "baseline"
              audit-version: "v1.34"
              warn: "restricted"
              warn-version: "v1.34"
            exemptions:
              # Array of authenticated usernames to exempt.
              usernames: []
              # Array of runtime class names to exempt.
              runtimeClasses: []
              # Array of namespaces to exempt.
              namespaces: [kube-system]

  preKubeadmCommands:
    # For enabling 'protect-kernel-defaults' flag to kubelet, kernel parameters changes are required
    - 'echo "====> Applying kernel parameters for Kubelet"'
    - 'sysctl -p /etc/sysctl.d/90-kubelet.conf'
    - 'test -f /etc/containerd/ca.crt && cp /etc/containerd/ca.crt /usr/local/share/ca-certificates/container.crt && update-ca-certificates && systemctl restart containerd'
    # vast-block (NVMe-TCP) node prereqs, BOTH absent from the base Ubuntu AWS image:
    #   1. the nvme-tcp kernel module (ships in linux-modules-extra-<kver>) — without it
    #      the block node fails 'modprobe nvme-tcp: Module not found';
    #   2. the nvme-cli userspace tool — the driver shells `nvme version`/discover/connect
    #      on the host, failing 'env: nvme: No such file or directory' (exit 127).
    # Install + load both on every node before kubeadm; persist the module across reboots.
    - 'echo "====> Installing nvme-tcp module + nvme-cli for vast-block"'
    - 'apt-get update -y || true'
    - 'modprobe nvme-tcp 2>/dev/null || { apt-get install -y linux-modules-extra-$(uname -r) && modprobe nvme-tcp; }'
    - 'command -v nvme >/dev/null 2>&1 || apt-get install -y nvme-cli'
    - 'echo nvme-tcp > /etc/modules-load.d/nvme-tcp.conf'

  postKubeadmCommands:
    - 'chmod 600 /var/lib/kubelet/config.yaml'
    # - 'echo "List of post kubeadm commands to be executed"'

# Client configuration to add OIDC based authentication flags in kubeconfig
#clientConfig:
  #oidc-issuer-url: "{{ .spectro.pack.kubernetes.kubeadmconfig.apiServer.extraArgs.oidc-issuer-url }}"
  #oidc-client-id: "{{ .spectro.pack.kubernetes.kubeadmconfig.apiServer.extraArgs.oidc-client-id }}"
  #oidc-client-secret: "{{ .spectro.pack.kubernetes.kubeadmconfig.apiServer.extraArgs.oidc-client-secret }}"
  #oidc-extra-scope: profile,email