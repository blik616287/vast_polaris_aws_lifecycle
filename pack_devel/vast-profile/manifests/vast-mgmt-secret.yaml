# vast-mgmt credentials Secret, injected as a profile manifest layer.
# The vast-csi / vast-cosi / vast-block charts all authenticate to the VMS via a
# pre-existing secret named "vast-mgmt" (charts.*.secretName) but do NOT create
# it. This manifest creates it in each pack's namespace from Palette profile
# variables, so the only place the VMS password lives is the encrypted, per-
# cluster variable value — never the published profile or pack values.
#
# stringData (not data) lets Palette substitute the raw variable values without
# base64 pre-encoding. Namespaces are declared here too so the secret applies
# cleanly regardless of layer ordering (apply is idempotent).
---
apiVersion: v1
kind: Namespace
metadata:
  name: vast-csi
  labels:
    pod-security.kubernetes.io/enforce: privileged
---
apiVersion: v1
kind: Secret
metadata:
  name: vast-mgmt
  namespace: vast-csi
type: Opaque
stringData:
  username: "{{.spectro.var.vmsUsername}}"
  password: "{{.spectro.var.vmsPassword}}"
  endpoint: "{{.spectro.var.vmsEndpoint}}"
---
apiVersion: v1
kind: Namespace
metadata:
  name: vast-cosi
---
apiVersion: v1
kind: Secret
metadata:
  name: vast-mgmt
  namespace: vast-cosi
type: Opaque
stringData:
  username: "{{.spectro.var.vmsUsername}}"
  password: "{{.spectro.var.vmsPassword}}"
  endpoint: "{{.spectro.var.vmsEndpoint}}"
---
apiVersion: v1
kind: Namespace
metadata:
  name: vast-block
  labels:
    pod-security.kubernetes.io/enforce: privileged
---
apiVersion: v1
kind: Secret
metadata:
  name: vast-mgmt
  namespace: vast-block
type: Opaque
stringData:
  username: "{{.spectro.var.vmsUsername}}"
  password: "{{.spectro.var.vmsPassword}}"
  endpoint: "{{.spectro.var.vmsEndpoint}}"
